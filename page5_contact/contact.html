<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guild Dispatch - Tree of Savior Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F4EBE1] min-h-screen pt-12 lg:pt-16 px-4 pb-6 relative overflow-x-hidden overflow-y-auto lg:overflow-hidden font-sans antialiased opacity-0 transition-opacity duration-700 ease-out select-none" id="contact-body">

    <div class="absolute inset-0 opacity-[0.08] pointer-events-none bg-chevron-pattern"></div>
    
    <div id="transition-overlay" class="fixed inset-0 bg-[#F4EBE1] z-50 pointer-events-none opacity-0 transition-opacity duration-500 ease-in-out"></div>

    <div class="relative max-w-7xl mx-auto h-auto min-h-[680px] lg:h-[680px] mt-12 lg:mt-4 z-10 pb-12 lg:pb-0">
        
        <div class="hidden sm:block absolute right-[-40px] top-10 bottom-10 w-48 bg-grid-green opacity-80 rounded-l-3xl transform rotate-1 pointer-events-none z-0"></div>

        <div class="absolute left-4 sm:left-12 lg:left-[260px] top-[-43px] lg:top-[-53px] flex items-end space-x-1 z-50 opacity-0 animate-nav-drop">
            <a href="../page2_hub/work.html" class="transition-link bg-[#CBBFA8] text-[#6E5A47] hover:bg-[#BCAE96] hover:text-[#4E3B29] w-[80px] lg:w-[100px] h-[36px] lg:h-[42px] rounded-t-xl lg:rounded-t-2xl border-t border-x border-[#B5A890] flex flex-col items-center justify-center pb-1 transition-all relative z-10 opacity-90 shadow-inner">
                <span class="text-sm mb-0.5">💼</span>
                <span class="text-[10px] lg:text-[11px] font-bold tracking-wide">Work</span>
            </a>
            
            <a href="../page4_about/about.html" class="transition-link bg-[#CBBFA8] text-[#6E5A47] hover:bg-[#BCAE96] hover:text-[#4E3B29] w-[80px] lg:w-[100px] h-[36px] lg:h-[42px] rounded-t-xl lg:rounded-t-2xl border-t border-x border-[#B5A890] flex flex-col items-center justify-center pb-1 transition-all relative z-10 opacity-90 shadow-inner">
                <span class="text-sm mb-0.5">🍂</span>
                <span class="text-[10px] lg:text-[11px] font-bold tracking-wide">About</span>
            </a>
            
            <div class="bg-[#FCFAF5] text-[#4E3B29] w-[85px] lg:w-[105px] h-[44px] lg:h-[54px] rounded-t-xl lg:rounded-t-2xl border-t border-x border-[#E3D8C3] flex flex-col items-center justify-center pb-1 relative z-30 shadow-xs">
                <span class="grid grid-cols-2 gap-0.5 w-2.5 h-2.5 lg:w-3 lg:h-3 mb-1"><span class="bg-[#4E3B29]"></span><span class="bg-[#4E3B29]"></span><span class="bg-[#4E3B29]"></span><span class="bg-[#4E3B29]"></span></span>
                <span class="text-[10px] lg:text-[11px] font-black tracking-wide">Contact</span>
            </div>
        </div>
        

        <div class="relative lg:absolute inset-x-0 sm:inset-x-4 top-0 lg:bottom-0 bg-[#FCFAF5] rounded-[1.5rem] sm:rounded-[2.5rem] border border-[#E3D8C3] shadow-xl p-4 sm:p-8 bg-dotted-pattern z-10 flex flex-col lg:block h-[840px] lg:h-full pt-8 pb-16 lg:py-8">
            
            <a href="../index.html" class="transition-link absolute top-4 sm:top-6 left-4 sm:left-6 z-40 flex items-center bg-[#FCFAF5] pl-2 pr-4 sm:pr-5 py-1 sm:py-1.5 rounded-full border border-[#E8DCCB] shadow-xs hover:scale-102 active:scale-98 transition-transform">
                <span class="w-5 h-5 sm:w-6 sm:h-6 rounded-full bg-[#EAA75D] text-white flex items-center justify-center text-[10px] sm:text-[11px] font-bold font-mono shadow-inner mr-2">x</span>
                <span class="text-[#7A6046] font-bold text-[10px] sm:text-xs tracking-wider">FariqZain</span>
            </a>

            <button id="memo-trigger" class="absolute top-4 sm:top-6 right-4 sm:right-6 z-40 bg-[#F7DF94] text-[#5A4C3A] text-[10px] sm:text-xs font-mono font-bold px-4 py-1.5 rounded-full border border-[#D6BC67] shadow-xs cursor-pointer hover:bg-[#FFF9C4] transition-all duration-200 animate-pulse">
                PULL MEMO ▾
            </button>

            <div class="absolute left-[-20px] bottom-[-25px] w-48 h-36 bg-[#EFECE6] p-3 shadow-md border border-[#D5CAA8] transform rotate-12 z-30 opacity-0 animate-peeking-envelope transition-all duration-300 ease-out hover:rotate-[6deg] hover:-translate-y-4 hover:scale-105 hover:z-50">
                <div class="w-full h-full border border-dashed border-[#B8AE8F] flex items-center justify-center font-serif text-[10px] text-[#8A7A5F]">
                    SEALED DISPATCH
                </div>
            </div>

            <div class="absolute left-1/2 -translate-x-1/2 top-[95px] lg:left-12 lg:translate-x-0 lg:top-[50%] lg:-translate-y-1/2 w-full max-w-[280px] z-30 text-center lg:text-left px-4 lg:pl-4">
                <h2 class="text-3xl sm:text-4xl lg:text-[44px] font-serif font-black text-[#4E3B29] leading-tight tracking-tighter opacity-0 animate-title-reveal">
                    Guild Dispatch
                </h2>
                <div class="text-[#967E66] font-bold uppercase tracking-widest text-[10px] mt-1 transform-gpu animate-uiux-transform">
                    Quest Generation
                </div>

                <div class="flex items-center justify-center lg:justify-start space-x-2 opacity-0 animate-badge-reveal mt-6 lg:mt-8">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_6px_#10b981] animate-pulse"></span>
                    <span class="text-[10px] font-mono font-bold text-[#8A715A] tracking-wider uppercase">Link Established</span>
                </div>
            </div>

            <div class="absolute left-1/2 transform -translate-x-1/2 lg:left-auto lg:right-6 lg:translate-x-0 lg:top-1/2 lg:-translate-y-1/2 w-[92%] sm:w-full max-w-[620px] h-auto lg:h-[450px] z-20 top-[250px] lg:top-0">
                
                <div class="bg-[#2E241B] text-[#E3D6C5] border-4 border-[#4E3B29] rounded-xl p-4 sm:p-5 shadow-2xl relative w-full h-full flex flex-col justify-between opacity-0 animate-window-in transition-all duration-300 ease-out hover:scale-[1.015] hover:shadow-[0_30px_60px_rgba(78,59,41,0.35)]">
                    
                    <div class="flex justify-between items-center border-b border-[#47382B] pb-2.5">
                        <div class="flex items-center space-x-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-rose-500 shadow-[0_0_6px_#f43f5e]"></span>
                            <span class="text-[10px] uppercase tracking-widest font-mono font-bold text-[#C7B299]">Post New Objective Mission</span>
                        </div>
                        <span class="text-[9px] font-mono text-[#8C755E]">STAMINA_COST: 0</span>
                    </div>

                    <form id="quest-dispatch-form" class="flex-1 mt-4 flex flex-col justify-between space-y-4 select-text">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div class="flex flex-col space-y-1">
                                <label class="text-[9px] uppercase font-bold tracking-wider text-[#B5A492]">Adventurer Name</label>
                                <input type="text" id="form-name" required placeholder="Enter alias..." class="bg-[#1F1710] border border-[#3D2F23] rounded p-2 text-xs text-white focus:outline-none focus:border-[#BA9875] transition-colors font-mono">
                            </div>
                            <div class="flex flex-col space-y-1">
                                <label class="text-[9px] uppercase font-bold tracking-wider text-[#B5A492]">Comms Address</label>
                                <input type="email" id="form-email" required placeholder="name@domain.com" class="bg-[#1F1710] border border-[#3D2F23] rounded p-2 text-xs text-white focus:outline-none focus:border-[#BA9875] transition-colors font-mono">
                            </div>
                        </div>

                        <div class="flex flex-col space-y-1 flex-1">
                            <label class="text-[9px] uppercase font-bold tracking-wider text-[#B5A492]">Quest Objective / Message Details</label>
                            <textarea id="form-msg" required rows="4" placeholder="Describe project scope, goals, or deployment alignment guidelines..." class="w-full flex-1 bg-[#1F1710] border border-[#3D2F23] rounded p-2 text-xs text-white focus:outline-none focus:border-[#BA9875] transition-colors font-mono resize-none min-h-[100px] lg:min-h-0"></textarea>
                        </div>

                        <div class="pt-2">
                            <button type="submit" id="btn-dispatch" class="w-full bg-[#A63C29] hover:bg-[#B54531] active:scale-98 text-white font-bold text-xs py-3.5 rounded shadow-lg border-b-4 border-[#78281A] transition-all duration-150 tracking-widest uppercase cursor-pointer">
                                Dispatch Quest Scroll Envelope ➔
                            </button>
                        </div>
                    </form>

                </div>

            </div>

        </div> 
        <div id="memo-card" class="absolute top-20 sm:top-24 right-8 sm:right-12 bg-[#FFF9C4] w-[220px] sm:w-[230px] p-5 shadow-lg border-l-4 border-yellow-400 font-serif text-[11px] text-[#5A4C3A] leading-relaxed rounded-b-md z-30 opacity-0 -translate-y-4 pointer-events-none transition-all duration-300 ease-out">
            <div class="absolute top-2 left-1/2 transform -translate-x-1/2 w-2.5 h-2.5 rounded-full bg-red-500 shadow-xs"></div>
            <div class="pt-2">
                <span class="font-bold block text-xs mb-1 text-yellow-800">Hi, I'm Fariq.</span>
                I love exploring UI/UX pipelines, and I also love kitty and I also love you with all of my heart. &lt;3
            </div>
            <div class="w-full h-3 border-t border-dashed border-yellow-400/40 mt-3 text-center text-[8px] tracking-widest text-[#5A4C3A]/30">SYSTEM LOG</div>
        </div>

    </div>

    <script src="main.js"></script>
</body>
</html>
